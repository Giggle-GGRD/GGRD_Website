    - heading "Settlement logic" [level=3] [ref=e264]
    - list [ref=e265]:
      - listitem [ref=e266]: If presale succeeds, finalize transfers raised USDC as 80% to liquidity wallet and 20% to marketing wallet.
      - listitem [ref=e267]: If presale fails (below softcap), each buyer can claim 100% refund in USDC.
      - listitem [ref=e268]: On success, buyer claim schedule is 50% immediate plus 50% linear over 60 days.
