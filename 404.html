<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>404 — Page Not Found · GGRD</title>
<link rel="icon" type="image/png" href="/img/ggrd-logo-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--yellow:#F3C512;--green:#00AA98;--bg:#0D0C0B;--white:#F7FAFC;--gray:rgba(247,250,252,0.6)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--white);font-family:'Courier Prime',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
.container{max-width:540px}
.code{font-family:'Bangers',cursive;font-size:8rem;color:var(--yellow);letter-spacing:8px;line-height:1}
.msg{font-size:1.2rem;margin:1rem 0 2rem;color:var(--gray)}
.btn{display:inline-block;padding:0.8rem 2rem;background:var(--green);color:var(--bg);text-decoration:none;font-weight:700;font-size:1rem;border-radius:4px;letter-spacing:1px;transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.logo{width:64px;height:64px;margin-bottom:1.5rem;opacity:0.8}
</style>
</head>
<body>
<div class="container">
  <img src="/img/ggrd-logo-512.png" alt="GGRD" class="logo">
  <div class="code">404</div>
  <p class="msg">This page doesn't exist — but $GGRD does.</p>
  <a href="/" class="btn">← Back to ggrd.me</a>
</div>
</body>
</html>
